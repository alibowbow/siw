<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시원스쿨 패턴 중국어 오디오 플레이어</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #131a2b;
      --panel: rgba(19, 26, 43, 0.78);
      --panel-strong: rgba(27, 36, 56, 0.92);
      --line: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #9fb0d0;
      --accent: #8b5cf6;
      --accent-2: #22c55e;
      --accent-3: #38bdf8;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 24%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 28%),
        linear-gradient(180deg, #0a0f1c 0%, #10182b 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      padding: 28px 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(22, 30, 48, 0.9), rgba(15, 22, 36, 0.88));
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #d9e3ff;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .player-panel {
      position: sticky;
      top: 12px;
      z-index: 50;
      padding: 18px;
      margin-bottom: 18px;
    }

    .now-playing {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    .track-title {
      font-size: clamp(1.15rem, 2.2vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      word-break: keep-all;
    }

    .track-url {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      color: #b8c7ea;
      text-decoration: none;
      font-size: 0.9rem;
      word-break: break-all;
    }

    .status-pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      font-weight: 700;
      font-size: 0.92rem;
      text-align: center;
      min-width: 108px;
    }

    audio {
      width: 100%;
      margin: 8px 0 12px;
      border-radius: 14px;
    }

    .controls-row,
    .toolbar,
    .meta-grid {
      display: grid;
      gap: 10px;
    }

    .controls-row {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .toolbar {
      grid-template-columns: 1.25fr 0.8fr 0.9fr 0.9fr;
      align-items: center;
    }

    .meta-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 12px;
    }

    .btn,
    .input,
    .select,
    .range-wrap {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 14px;
    }

    .btn {
      padding: 13px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      min-height: 48px;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      border-color: rgba(255,255,255,0.12);
    }

    .btn.green {
      background: linear-gradient(135deg, #16a34a, var(--accent-2));
      border-color: rgba(255,255,255,0.12);
    }

    .btn.active {
      outline: 2px solid rgba(56, 189, 248, 0.5);
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .btn.ghost {
      background: rgba(255,255,255,0.03);
    }

    .input,
    .select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      font-size: 0.98rem;
      outline: none;
    }

    .input::placeholder {
      color: #96a6ca;
    }

    .range-wrap {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 48px;
    }

    .range-wrap label {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    .content-panel {
      padding: 18px;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .list-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .list-sub {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
    }

    .track-btn {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border-radius: 16px;
      padding: 14px 10px 12px;
      min-height: 84px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: 0.18s ease;
    }

    .track-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.32);
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.12), rgba(255,255,255,0.04));
    }

    .track-btn.active {
      border-color: rgba(139, 92, 246, 0.85);
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.26), rgba(56, 189, 248, 0.12));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 10px 24px rgba(139, 92, 246, 0.2);
    }

    .track-btn.active::after {
      content: "재생중";
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
    }

    .track-num {
      display: block;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .track-text {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.14);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }

    .footer-note {
      color: var(--muted);
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .controls-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
      .meta-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .wrap {
        padding: 14px 12px 28px;
      }
      .hero,
      .player-panel,
      .content-panel {
        border-radius: 20px;
      }
      .hero {
        padding: 22px 16px;
      }
      .player-panel {
        top: 8px;
        padding: 14px;
      }
      .now-playing {
        grid-template-columns: 1fr;
      }
      .controls-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .toolbar {
        grid-template-columns: 1fr;
      }
      .track-grid {
        grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      }
      .btn, .input, .select {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 class="title">시원스쿨 패턴 중국어 오디오 플레이어</h1>
          <p class="subtitle">
            1번부터 263번까지 한 페이지에서 바로 재생할 수 있게 만든 플레이어야.
            원하는 번호를 눌러 바로 듣고, 연속 듣기를 켜면 끝나자마자 다음 번호로 자동 재생돼.
          </p>
        </div>
        <div class="badges">
          <div class="badge">총 263개 트랙</div>
          <div class="badge">모바일 최적화</div>
          <div class="badge">연속 듣기 지원</div>
        </div>
      </div>
    </section>

    <section class="panel player-panel">
      <div class="now-playing">
        <div>
          <div class="label">현재 재생</div>
          <div id="trackTitle" class="track-title">Pattern 1</div>
          <a id="trackUrl" class="track-url" href="#" target="_blank" rel="noopener noreferrer">파일 주소 열기</a>
        </div>
        <div id="statusPill" class="status-pill">대기 중</div>
      </div>

      <audio id="audio" controls preload="none"></audio>

      <div class="controls-row">
        <button id="prevBtn" class="btn ghost">⏮ 이전</button>
        <button id="playPauseBtn" class="btn primary">▶ 재생</button>
        <button id="nextBtn" class="btn ghost">다음 ⏭</button>
        <button id="playFromStartBtn" class="btn green">처음부터 듣기</button>
        <button id="jumpCurrentBtn" class="btn ghost">현재 위치 보기</button>
      </div>

      <div class="toolbar">
        <input id="searchInput" class="input" type="text" inputmode="numeric" placeholder="번호 검색 예: 12, 120" />
        <button id="continuousBtn" class="btn active">연속 듣기 ON</button>
        <select id="speedSelect" class="select" aria-label="재생 속도">
          <option value="0.8">속도 0.8x</option>
          <option value="1" selected>속도 1.0x</option>
          <option value="1.2">속도 1.2x</option>
          <option value="1.5">속도 1.5x</option>
          <option value="1.8">속도 1.8x</option>
        </select>
        <div class="range-wrap">
          <label for="volumeRange">볼륨</label>
          <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="1" />
        </div>
      </div>

      <div class="meta-grid">
        <button id="copyCurrentBtn" class="btn ghost">현재 링크 복사</button>
        <button id="openCurrentBtn" class="btn ghost">현재 링크 새 탭</button>
        <button id="resetBtn" class="btn ghost">검색 초기화</button>
      </div>
    </section>

    <section class="panel content-panel">
      <div class="list-head">
        <div>
          <div class="list-title">트랙 목록</div>
          <div id="listInfo" class="list-sub">총 263개 표시 중</div>
        </div>
        <div class="badges">
          <div class="badge">번호 클릭 즉시 재생</div>
          <div class="badge">현재 번호 자동 강조</div>
        </div>
      </div>

      <div id="trackGrid" class="track-grid"></div>
      <div class="footer-note">
        연속 듣기 상태, 현재 번호, 속도, 볼륨은 브라우저에 저장돼서 다음에 다시 열어도 이어서 쓰기 편하게 해뒀어.
      </div>
    </section>
  </div>

  <script>
    const BASE_URL = "https://www-ndrm.siwonschool.com/qr/china/20160707/china_pattern_";
    const MAX_TRACK = 263;

    const state = {
      current: Number(localStorage.getItem("siwon.current") || 1),
      continuous: JSON.parse(localStorage.getItem("siwon.continuous") ?? "true"),
      speed: Number(localStorage.getItem("siwon.speed") || 1),
      volume: Number(localStorage.getItem("siwon.volume") || 1),
      query: ""
    };

    const audio = document.getElementById("audio");
    const trackTitle = document.getElementById("trackTitle");
    const trackUrl = document.getElementById("trackUrl");
    const statusPill = document.getElementById("statusPill");
    const trackGrid = document.getElementById("trackGrid");
    const listInfo = document.getElementById("listInfo");
    const searchInput = document.getElementById("searchInput");
    const continuousBtn = document.getElementById("continuousBtn");
    const speedSelect = document.getElementById("speedSelect");
    const volumeRange = document.getElementById("volumeRange");
    const playPauseBtn = document.getElementById("playPauseBtn");

    function clampTrack(n) {
      return Math.min(MAX_TRACK, Math.max(1, Number(n) || 1));
    }

    function getTrackUrl(n) {
      return `${BASE_URL}${n}.mp3`;
    }

    function getTrackTitle(n) {
      return `Pattern ${n}`;
    }

    function saveState() {
      localStorage.setItem("siwon.current", String(state.current));
      localStorage.setItem("siwon.continuous", JSON.stringify(state.continuous));
      localStorage.setItem("siwon.speed", String(state.speed));
      localStorage.setItem("siwon.volume", String(state.volume));
    }

    function updateNowPlaying() {
      trackTitle.textContent = getTrackTitle(state.current);
      const url = getTrackUrl(state.current);
      trackUrl.href = url;
      trackUrl.textContent = url;
      updateStatus(audio.paused ? "대기 중" : "재생 중");
    }

    function updateStatus(text) {
      statusPill.textContent = text;
    }

    function updateButtons() {
      continuousBtn.textContent = state.continuous ? "연속 듣기 ON" : "연속 듣기 OFF";
      continuousBtn.classList.toggle("active", state.continuous);
      playPauseBtn.textContent = audio.paused ? "▶ 재생" : "⏸ 일시정지";
    }

    function makeTrackButton(n) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "track-btn";
      btn.dataset.track = String(n);
      btn.innerHTML = `
        <span class="track-num">${n}</span>
        <span class="track-text">눌러서 재생</span>
      `;
      if (n === state.current) btn.classList.add("active");
      btn.addEventListener("click", () => loadTrack(n, true));
      return btn;
    }

    function renderTracks() {
      const q = state.query.trim();
      trackGrid.innerHTML = "";

      const matched = [];
      for (let i = 1; i <= MAX_TRACK; i++) {
        if (!q || String(i).includes(q)) matched.push(i);
      }

      listInfo.textContent = q
        ? `검색 결과 ${matched.length}개 · 번호에 ${q} 포함`
        : `총 ${MAX_TRACK}개 표시 중`;

      if (matched.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "검색 결과가 없어. 다른 번호를 입력해봐.";
        trackGrid.appendChild(empty);
        return;
      }

      const fragment = document.createDocumentFragment();
      matched.forEach((n) => fragment.appendChild(makeTrackButton(n)));
      trackGrid.appendChild(fragment);
      highlightCurrent();
    }

    function highlightCurrent() {
      document.querySelectorAll(".track-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.track) === state.current);
      });
    }

    function loadTrack(n, shouldPlay = false) {
      state.current = clampTrack(n);
      const newUrl = getTrackUrl(state.current);
      if (audio.src !== newUrl) {
        audio.src = newUrl;
      }
      saveState();
      updateNowPlaying();
      highlightCurrent();
      if (shouldPlay) {
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => updateStatus("재생하려면 한 번 더 눌러줘"));
        }
      }
      scrollCurrentIntoView();
    }

    function scrollCurrentIntoView() {
      const active = document.querySelector(`.track-btn[data-track="${state.current}"]`);
      if (active) {
        active.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
      }
    }

    function togglePlayPause() {
      if (!audio.src) loadTrack(state.current, false);
      if (audio.paused) {
        audio.play().catch(() => updateStatus("재생하려면 다시 눌러줘"));
      } else {
        audio.pause();
      }
    }

    function nextTrack(autoPlay = true) {
      if (state.current < MAX_TRACK) {
        loadTrack(state.current + 1, autoPlay);
      }
    }

    function prevTrack(autoPlay = true) {
      if (state.current > 1) {
        loadTrack(state.current - 1, autoPlay);
      }
    }

    async function copyCurrentLink() {
      try {
        await navigator.clipboard.writeText(getTrackUrl(state.current));
        updateStatus("링크 복사 완료");
        setTimeout(() => updateStatus(audio.paused ? "대기 중" : "재생 중"), 1200);
      } catch {
        updateStatus("복사 실패");
        setTimeout(() => updateStatus(audio.paused ? "대기 중" : "재생 중"), 1200);
      }
    }

    document.getElementById("prevBtn").addEventListener("click", () => prevTrack(true));
    document.getElementById("nextBtn").addEventListener("click", () => nextTrack(true));
    document.getElementById("playPauseBtn").addEventListener("click", togglePlayPause);
    document.getElementById("playFromStartBtn").addEventListener("click", () => loadTrack(1, true));
    document.getElementById("jumpCurrentBtn").addEventListener("click", scrollCurrentIntoView);
    document.getElementById("copyCurrentBtn").addEventListener("click", copyCurrentLink);
    document.getElementById("openCurrentBtn").addEventListener("click", () => window.open(getTrackUrl(state.current), "_blank"));
    document.getElementById("resetBtn").addEventListener("click", () => {
      searchInput.value = "";
      state.query = "";
      renderTracks();
    });

    continuousBtn.addEventListener("click", () => {
      state.continuous = !state.continuous;
      saveState();
      updateButtons();
    });

    speedSelect.addEventListener("change", (e) => {
      state.speed = Number(e.target.value);
      audio.playbackRate = state.speed;
      saveState();
    });

    volumeRange.addEventListener("input", (e) => {
      state.volume = Number(e.target.value);
      audio.volume = state.volume;
      saveState();
    });

    searchInput.addEventListener("input", (e) => {
      state.query = e.target.value.replace(/[^0-9]/g, "");
      e.target.value = state.query;
      renderTracks();
    });

    audio.addEventListener("play", () => {
      updateStatus("재생 중");
      updateButtons();
    });

    audio.addEventListener("pause", () => {
      updateStatus("대기 중");
      updateButtons();
    });

    audio.addEventListener("ended", () => {
      if (state.continuous && state.current < MAX_TRACK) {
        loadTrack(state.current + 1, true);
      } else if (state.current >= MAX_TRACK) {
        updateStatus("마지막 트랙 종료");
        updateButtons();
      } else {
        updateStatus("재생 완료");
        updateButtons();
      }
    });

    audio.addEventListener("error", () => {
      updateStatus("오디오 로드 오류");
      updateButtons();
    });

    state.current = clampTrack(state.current);
    audio.volume = state.volume;
    audio.playbackRate = state.speed;
    speedSelect.value = String(state.speed);
    volumeRange.value = String(state.volume);

    renderTracks();
    loadTrack(state.current, false);
    updateButtons();
  </script>
</body>
</html>
