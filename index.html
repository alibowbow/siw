 <!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시원스쿨 패턴 중국어 오디오 플레이어</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #131a2b;
      --panel: rgba(19, 26, 43, 0.82);
      --line: rgba(255, 255, 255, 0.1);
      --text: #eef2ff;
      --muted: #9fb0d0;
      --accent: #8b5cf6;
      --accent2: #22c55e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 24px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 24%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 28%),
        linear-gradient(180deg, #0a0f1c 0%, #10182b 100%);
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 28px 22px;
      margin-bottom: 18px;
      background: linear-gradient(180deg, rgba(22, 30, 48, 0.9), rgba(15, 22, 36, 0.88));
    }

    .hero-top {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #d9e3ff;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .player-panel,
    .content-panel { padding: 18px; }

    .player-panel { margin-bottom: 18px; }

    .now-playing {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 4px;
    }

    .track-title {
      font-size: clamp(1.15rem, 2.2vw, 1.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      word-break: keep-all;
    }

    .track-url {
      display: inline-flex;
      margin-top: 6px;
      color: #b8c7ea;
      text-decoration: none;
      font-size: 0.9rem;
      word-break: break-all;
    }

    .status-pill {
      min-width: 108px;
      text-align: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      font-weight: 700;
      font-size: 0.92rem;
    }

    audio {
      width: 100%;
      margin: 8px 0 12px;
      border-radius: 14px;
    }

    .controls-row,
    .toolbar {
      display: grid;
      gap: 10px;
    }

    .controls-row {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .toolbar {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
    }

    .btn,
    .select,
    .range-wrap {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .btn {
      min-height: 48px;
      padding: 13px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn.green {
      background: linear-gradient(135deg, #16a34a, var(--accent2));
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn.active {
      outline: 2px solid rgba(56, 189, 248, 0.5);
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
    }

    .btn.ghost { background: rgba(255, 255, 255, 0.03); }

    .select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      font-size: 0.98rem;
      outline: none;
    }

    .range-wrap {
      min-height: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 12px;
    }
.range-wrap label {
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    input[type="range"] { width: 100%; }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .list-title {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .list-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
    }

    .track-btn {
      position: relative;
      overflow: hidden;
      min-height: 84px;
      padding: 14px 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03));
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .track-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.32);
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.12), rgba(255, 255, 255, 0.04));
    }

    .track-btn.active {
      border-color: rgba(139, 92, 246, 0.85);
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.26), rgba(56, 189, 248, 0.12));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 10px 24px rgba(139, 92, 246, 0.2);
    }

    .track-btn.active::after {
      content: "재생중";
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(6px);
    }

    .track-num {
      display: block;
      margin-bottom: 4px;
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .track-text {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .controls-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 620px) {
      .wrap { padding: 14px 12px 28px; }
      .hero, .player-panel, .content-panel { border-radius: 20px; }
      .hero { padding: 22px 16px; }
      .player-panel, .content-panel { padding: 14px; }
      .now-playing { grid-template-columns: 1fr; }
      .controls-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .track-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
      .btn, .select { min-height: 46px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel hero">
      <div class="hero-top">
        <div>
          <h1 class="title">시원스쿨 패턴 중국어 재생 플레이어</h1>
        
        </div>
        <div class="badges">
          <div class="badge">총 263개 트랙</div>
          <div class="badge">모바일 최적화</div>
          <div class="badge">연속 듣기 지원</div>
        </div>
      </div>
    </section>

    <section class="panel player-panel">
      <div class="now-playing">
        <div>
          <div class="label">현재 재생</div>
          <div id="trackTitle" class="track-title">Pattern 1</div>
          <a id="trackUrl" class="track-url" href="#" target="_blank" rel="noopener noreferrer">파일 주소 열기</a>
        </div>
        <div id="statusPill" class="status-pill">대기 중</div>
      </div>

      <audio id="audio" controls preload="none"></audio>

      <div class="controls-row">
        <button id="prevBtn" class="btn ghost" type="button">⏮ 이전</button>
        <button id="playPauseBtn" class="btn primary" type="button">▶ 재생</button>
        <button id="nextBtn" class="btn ghost" type="button">다음 ⏭</button>
        <button id="playFromStartBtn" class="btn green" type="button">처음부터 듣기</button>
        <button id="jumpCurrentBtn" class="btn ghost" type="button">현재 위치 보기</button>
      </div>

      <div class="toolbar">
        <button id="continuousBtn" class="btn active" type="button">연속 듣기 ON</button>
        <select id="speedSelect" class="select" aria-label="재생 속도">
          <option value="0.8">속도 0.8x</option>
          <option value="1" selected>속도 1.0x</option>
          <option value="1.2">속도 1.2x</option>
          <option value="1.5">속도 1.5x</option>
          <option value="1.8">속도 1.8x</option>
        </select>
        <div class="range-wrap">
          <label for="volumeRange">볼륨</label>
          <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="1" />
        </div>
      </div>
    </section>

    <section class="panel content-panel">
      <div class="list-head">
        <div>
          <div class="list-title">트랙 목록</div>
          <div id="listInfo" class="list-sub">총 263개 표시 중</div>
        </div>
        <div class="badges">
          <div class="badge">번호 클릭 즉시 재생</div>
          <div class="badge">현재 번호 자동 강조</div>
        </div>
      </div>

      <div id="trackGrid" class="track-grid"></div>
      <div class="footer-note">
       
      </div>
    </section>
  </div>

  <script>
    (() => {
      "use strict";

      const BASE_URL = "https://www-ndrm.siwonschool.com/qr/china/20160707/china_pattern_";
      const MAX_TRACK = 263;

      const state = {
        current: Number(localStorage.getItem("siwon.current") || 1),
        continuous: JSON.parse(localStorage.getItem("siwon.continuous") ?? "true"),
        speed: Number(localStorage.getItem("siwon.speed") || 1),
        volume: Number(localStorage.getItem("siwon.volume") || 1)
      };

      const el = {
        audio: document.getElementById("audio"),
        trackTitle: document.getElementById("trackTitle"),
        trackUrl: document.getElementById("trackUrl"),
        statusPill: document.getElementById("statusPill"),
        trackGrid: document.getElementById("trackGrid"),
        listInfo: document.getElementById("listInfo"),
        continuousBtn: document.getElementById("continuousBtn"),
        speedSelect: document.getElementById("speedSelect"),
        volumeRange: document.getElementById("volumeRange"),
        playPauseBtn: document.getElementById("playPauseBtn"),
        prevBtn: document.getElementById("prevBtn"),
        nextBtn: document.getElementById("nextBtn"),
        playFromStartBtn: document.getElementById("playFromStartBtn"),
        jumpCurrentBtn: document.getElementById("jumpCurrentBtn")
      };

      const clampTrack = (n) => Math.min(MAX_TRACK, Math.max(1, Number(n) || 1));
const getTrackUrl = (n) => `${BASE_URL}${n}.mp3`;
      const getTrackTitle = (n) => `Pattern ${n}`;

      function saveState() {
        localStorage.setItem("siwon.current", String(state.current));
        localStorage.setItem("siwon.continuous", JSON.stringify(state.continuous));
        localStorage.setItem("siwon.speed", String(state.speed));
        localStorage.setItem("siwon.volume", String(state.volume));
      }

      function updateStatus(text) {
        el.statusPill.textContent = text;
      }

      function updateButtons() {
        el.continuousBtn.textContent = state.continuous ? "연속 듣기 ON" : "연속 듣기 OFF";
        el.continuousBtn.classList.toggle("active", state.continuous);
        el.playPauseBtn.textContent = el.audio.paused ? "▶ 재생" : "⏸ 일시정지";
      }

      function updateNowPlaying() {
        el.trackTitle.textContent = getTrackTitle(state.current);
        const url = getTrackUrl(state.current);
        el.trackUrl.href = url;
        el.trackUrl.textContent = url;
        updateStatus(el.audio.paused ? "대기 중" : "재생 중");
      }

      function highlightCurrent() {
        const buttons = el.trackGrid.querySelectorAll(".track-btn");
        buttons.forEach((btn) => {
          btn.classList.toggle("active", Number(btn.dataset.track) === state.current);
        });
      }

      function scrollCurrentIntoView() {
        const active = el.trackGrid.querySelector(`.track-btn[data-track="${state.current}"]`);
        if (active) active.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
      }

      function loadTrack(n, shouldPlay = false) {
        state.current = clampTrack(n);
        const nextUrl = getTrackUrl(state.current);
        if (el.audio.src !== nextUrl) {
          el.audio.src = nextUrl;
        }

        saveState();
        updateNowPlaying();
        highlightCurrent();

        if (shouldPlay) {
          const playPromise = el.audio.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => updateStatus("재생하려면 한 번 더 눌러줘"));
          }
        }
      }

      function makeTrackButton(n) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "track-btn";
        btn.dataset.track = String(n);
        btn.innerHTML = `<span class="track-num">${n}</span><span class="track-text">눌러서 재생</span>`;
        if (n === state.current) btn.classList.add("active");
        btn.addEventListener("click", () => loadTrack(n, true));
        return btn;
      }

      function renderTracks() {
        el.trackGrid.innerHTML = "";
        el.listInfo.textContent = `총 ${MAX_TRACK}개 표시 중`;
        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= MAX_TRACK; i += 1) {
          fragment.appendChild(makeTrackButton(i));
        }
        el.trackGrid.appendChild(fragment);
        highlightCurrent();
      }

      function togglePlayPause() {
        if (!el.audio.src) loadTrack(state.current, false);
        if (el.audio.paused) {
          el.audio.play().catch(() => updateStatus("재생하려면 다시 눌러줘"));
        } else {
          el.audio.pause();
        }
      }

      function bindEvents() {
        el.prevBtn.addEventListener("click", () => {
          if (state.current > 1) loadTrack(state.current - 1, true);
        });

        el.nextBtn.addEventListener("click", () => {
          if (state.current < MAX_TRACK) loadTrack(state.current + 1, true);
        });

        el.playPauseBtn.addEventListener("click", togglePlayPause);
        el.playFromStartBtn.addEventListener("click", () => loadTrack(1, true));
        el.jumpCurrentBtn.addEventListener("click", scrollCurrentIntoView);

        el.continuousBtn.addEventListener("click", () => {
          state.continuous = !state.continuous;
          saveState();
          updateButtons();
        });

        el.speedSelect.addEventListener("change", (event) => {
          state.speed = Number(event.target.value);
          el.audio.playbackRate = state.speed;
          saveState();
        });

        el.volumeRange.addEventListener("input", (event) => {
          state.volume = Number(event.target.value);
          el.audio.volume = state.volume;
          saveState();
        });

        el.audio.addEventListener("play", () => {
          updateStatus("재생 중");
          updateButtons();
        });

        el.audio.addEventListener("pause", () => {
          updateStatus("대기 중");
          updateButtons();
        });

        el.audio.addEventListener("ended", () => {
          if (state.continuous && state.current < MAX_TRACK) {
            loadTrack(state.current + 1, true);
          } else if (state.current >= MAX_TRACK) {
            updateStatus("마지막 트랙 종료");
            updateButtons();
          } else {
            updateStatus("재생 완료");
            updateButtons();
          }
        });

        el.audio.addEventListener("error", () => {
          updateStatus("오디오 로드 오류");
          updateButtons();
        });
      }

      function init() {
        state.current = clampTrack(state.current);
        state.speed = Number.isFinite(state.speed) ? state.speed : 1;
        state.volume = Number.isFinite(state.volume) ? state.volume : 1;

        el.audio.playbackRate = state.speed;
        el.audio.volume = Math.min(1, Math.max(0, state.volume));
        el.speedSelect.value = String(state.speed);
        el.volumeRange.value = String(el.audio.volume);

        renderTracks();
        loadTrack(state.current, false);
        updateButtons();
        bindEvents();
      }

      init();
    })();
  </script>
</body>
</html>
